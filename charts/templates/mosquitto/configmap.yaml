{{- if .Values.enableChart -}}
{{- if .Values.mosquitto.enabled -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mission-dispatch.fullname" . }}-mosquitto-config-file
  labels:
    app: {{ include "mission-dispatch.fullname" . }}-mqtt_broker
data:
  mosquitto.conf: |-
    listener 1883 0.0.0.0
    protocol websockets
    allow_anonymous true

{{- end }}
{{- end }}