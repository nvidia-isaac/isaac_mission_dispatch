{{- if .Values.enableChart -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mission-dispatch.fullname" . }}-database
  labels:
    app: {{ include "mission-dispatch.fullname" . }}-database
spec:
  replicas: {{ .Values.database.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "mission-dispatch.fullname" . }}-database
  template:
    metadata:
      labels:
        app: {{ include "mission-dispatch.fullname" . }}-database
    spec:
      {{ if .Values.global.ngcImagePullSecretName -}}
      imagePullSecrets:
        - name: {{ .Values.global.ngcImagePullSecretName | quote -}}
      {{ else }}
        {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{ end }}
      containers:
      - name: {{ include "mission-dispatch.fullname" . }}-database
        image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.database.image.pullPolicy }}
        command: ["sh"]
        args:
        - -c
        - |
           /app/packages/database/postgres-img.binary --root_path "{{ .Values.dispatch.ingress.missionUrl }}" \
           --address 0.0.0.0 --port 5000 --controller_port 5001 --db_host postgres \
           --db_name {{ .Values.postgres.auth.database }} --db_port {{ .Values.postgres.service.ports.postgresql }} --db_username $DB_USERNAME --db_password $DB_PASSWORD 
        env:
        - name: "DB_USERNAME"
          value: {{ .Values.postgres.auth.username }}
        - name: "DB_PASSWORD"
          valueFrom:
            secretKeyRef:
              key: postgres-password
              name: mission-dispatch-postgres
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        - name: http-internal
          containerPort: 5001
          protocol: TCP
        resources:
          requests:
            cpu: {{ .Values.resources.database.requests.cpu }}
            memory: {{ .Values.resources.database.requests.memory }}
          limits:
            cpu: {{ .Values.resources.database.limits.cpu }}
            memory: {{ .Values.resources.database.limits.memory }}
{{- end }}